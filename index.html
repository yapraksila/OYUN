// Ball Throw — mouse aim from alien
function BallThrow({onHit}){
  const monkeyPos={x:74,y:31};
  const alienPos={x:16,y:82};
  const hitBox={x:6,y:8};
  const [aim,setAim]=useState(monkeyPos);
  const [thrown,setThrown]=useState(false);
  const [ball,setBall]=useState(null);
  const [result,setResult]=useState(null);
  const ref=useRef(null);

  const handleAim=useCallback(e=>{
    if(thrown)return;
    const r=ref.current?.getBoundingClientRect();
    if(!r)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    setAim({x:((cx-r.left)/r.width)*100,y:((cy-r.top)/r.height)*100});
  },[thrown]);

  const fire=useCallback(()=>{
    if(thrown||result==="hit")return;
    setThrown(true);
    setResult(null);
    let step=0;
    const totalSteps=32;
    const dx=aim.x-alienPos.x;
    const dy=aim.y-alienPos.y;
    const arcLift=Math.max(10,Math.abs(dy)*0.22+8);
    setBall({x:alienPos.x,y:alienPos.y});

    const iv=setInterval(()=>{
      step++;
      const t=step/totalSteps;
      const x=alienPos.x+dx*t;
      const y=alienPos.y+dy*t-arcLift*4*t*(1-t);
      const nextBall={x:Math.max(0,Math.min(x,98)),y:Math.max(0,Math.min(y,98))};
      setBall(nextBall);

      if(Math.abs(nextBall.x-monkeyPos.x)<=hitBox.x&&Math.abs(nextBall.y-monkeyPos.y)<=hitBox.y){
        clearInterval(iv);
        setResult("hit");
        setBall(nextBall);
        setTimeout(onHit,1000);
        return;
      }

      if(step>=totalSteps){
        clearInterval(iv);
        setResult("miss");
        setTimeout(()=>{
          setThrown(false);
          setBall(null);
          setResult(null);
          setAim(monkeyPos);
        },900);
      }
    },35);
  },[aim,thrown,result,onHit]);

  return(
  <div ref={ref} onMouseMove={handleAim} onTouchMove={handleAim} onClick={fire} onTouchEnd={e=>{e.preventDefault();fire();}}
    style={{position:"absolute",inset:0,zIndex:10,cursor:thrown?"default":"crosshair",touchAction:"none"}}>
    {/* Monkey placed directly on the large right tree */}
    {result!=="hit"&&<div style={{position:"absolute",left:`${monkeyPos.x}%`,top:`${monkeyPos.y}%`,transform:"translate(-50%,-50%)",fontSize:24,zIndex:6}}>🐒</div>}
    {result==="hit"&&<div style={{position:"absolute",left:"72%",top:"56%",transform:"translate(-50%,-50%)",fontSize:30,zIndex:6,animation:"fadeIn .5s"}}>🐵</div>}
    {/* Alien at bottom-left */}
    <div style={{position:"absolute",left:`${alienPos.x}%`,top:`${alienPos.y}%`,transform:"translate(-50%,-50%)",fontSize:42,zIndex:6}}>👽</div>
    {/* Ball in flight */}
    {ball&&<div style={{position:"absolute",left:`${ball.x}%`,top:`${ball.y}%`,transform:"translate(-50%,-50%)",fontSize:20,zIndex:7}}>⚽</div>}
    {/* Aim line from alien to cursor */}
    {!thrown&&!result&&<svg style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:5}} viewBox="0 0 100 100" preserveAspectRatio="none">
      <line x1={alienPos.x} y1={alienPos.y} x2={aim.x} y2={aim.y} stroke="rgba(255,255,0,.4)" strokeWidth=".4" strokeDasharray="1.5 1"/>
      <circle cx={aim.x} cy={aim.y} r="1.5" fill="none" stroke="rgba(255,255,0,.6)" strokeWidth=".3"/>
    </svg>}
    {!thrown&&!result&&<div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.8)",borderRadius:8,padding:"6px 14px",zIndex:20}}>
      <div style={{color:"#fa0",fontSize:10,fontFamily:"monospace"}}>🎯 Aim exactly at the monkey and click!</div>
    </div>}
    {result==="miss"&&<div style={{position:"absolute",top:"40%",left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.85)",padding:"8px 16px",borderRadius:8,zIndex:20}}>
      <div style={{color:"#f88",fontSize:11,fontFamily:"monospace"}}>Missed! Try again.</div>
    </div>}
  </div>);
}

// Stealth — balanced difficulty
function Stealth({onWin,onCaught}){
  const [prog,setProg]=useState(0);const [dir,setDir]=useState("right");const [hold,setHold]=useState(false);const [caught,setCaught]=useState(false);
  const hr=useRef(false);const ir=useRef(null);
  useEffect(()=>{const t=setInterval(()=>{setDir(()=>{const n=Math.random()>.6?"left":"right"; // 40% looks at you
    if(n==="left"&&hr.current){setCaught(true);hr.current=false;if(ir.current)clearInterval(ir.current);}return n;});},1500); // 1.5s — balanced
    return()=>clearInterval(t);},[]);
  const dn=()=>{if(caught)return;if(dir==="left"){setCaught(true);onCaught();return;}setHold(true);hr.current=true;
    ir.current=setInterval(()=>{setProg(p=>{if(p>=100){clearInterval(ir.current);hr.current=false;setHold(false);onWin();return 100;}return p+4;});},100);};
  const up=()=>{setHold(false);hr.current=false;if(ir.current)clearInterval(ir.current);};
  const restart=()=>{setCaught(false);setProg(0);onCaught();};
  if(caught)return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(20,0,0,.92)",zIndex:20}}>
    <div style={{fontSize:52}}>🦁</div><div style={{color:"#f44",fontSize:14,fontFamily:"monospace",margin:"10px 0"}}>CAUGHT!</div>
    <div style={{color:"#faa",fontSize:11,marginBottom:12}}>Nitrogen dropped! Try again from scratch.</div>
    <button onClick={restart} style={{background:"#f44",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontSize:12}}>Restart</button></div>);
  return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:10,userSelect:"none"}}>
    {/* Car with motor */}
    <div style={{position:"absolute",bottom:"12%",right:"15%",fontSize:11,color:"#fa0",fontFamily:"monospace",textAlign:"center"}}>
      <div style={{fontSize:36}}>🚗</div><div>⚙️ Motor</div></div>

// Magnet puzzle
function MagnetPuzzle({onDone}){
  const coins=useRef(Array.from({length:9},(_,i)=>({id:i,gold:i<3,x:14+(i%3)*28,y:i<3?44:i<6?57:70}))).current;
  const [mp,setMp]=useState({x:50,y:24});const [att,setAtt]=useState(new Set());const [ok,setOk]=useState(false);const ref=useRef(null);
  const mv=useCallback(e=>{if(ok)return;const r=ref.current?.getBoundingClientRect();if(!r)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
    const x=((cx-r.left)/r.width)*100;const y=((cy-r.top)/r.height)*100;
    setMp({x:Math.max(5,Math.min(95,x)),y:Math.max(5,Math.min(95,y))});
    const nw=new Set(att);coins.forEach(c=>{if(!c.gold&&!nw.has(c.id)&&Math.sqrt((x-c.x)**2+(y-c.y)**2)<13)nw.add(c.id);});
    setAtt(nw);if(nw.size===coins.filter(c=>!c.gold).length&&!ok){setOk(true);setTimeout(onDone,1200);}},[att,ok]);
  return(<div ref={ref} onMouseMove={mv} onTouchMove={mv} style={{position:"absolute",inset:0,cursor:"none",touchAction:"none",zIndex:10}}>
    <div style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",color:"#fa0",fontSize:10,fontFamily:"monospace",background:"rgba(0,0,0,.7)",padding:"3px 10px",borderRadius:6,zIndex:20}}>Use the magnet to separate iron from gold!</div>
    {coins.map(c=><div key={c.id} style={{position:"absolute",left:att.has(c.id)?`${mp.x}%`:`${c.x}%`,top:att.has(c.id)?`${mp.y}%`:`${c.y}%`,fontSize:24,transition:att.has(c.id)?"all .3s":"none",transform:"translate(-50%,-50%)",filter:c.gold?"drop-shadow(0 0 6px gold)":"none"}}>{c.gold?"🪙":"🔘"}</div>)}
    <div style={{position:"absolute",left:`${mp.x}%`,top:`${mp.y}%`,fontSize:30,transform:"translate(-50%,-50%)",pointerEvents:"none",filter:"drop-shadow(0 0 8px rgba(0,150,255,.5))"}}>🧲</div>
    {ok&&<div style={{position:"absolute",bottom:"20%",left:"50%",transform:"translateX(-50%)",color:"#0f8",fontSize:13,fontFamily:"monospace",background:"rgba(0,0,0,.7)",padding:"5px 14px",borderRadius:6}}>✅ Gold separated!</div>}
  </div>);}

// Flowchart
function Flowchart({onDone}){
  const ans=["Budget Planning","Load Requirements","Material Selection","Bridge Design","Material Procurement","Quality Inspection","Site Deployment","Issue Tracking"];
  const [items,setItems]=useState(()=>{const s=[...ans];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;});
  const [ok,setOk]=useState(false);const [wrong,setWrong]=useState(false);
  const mv=(f,t)=>{const a=[...items];const[it]=a.splice(f,1);a.splice(t,0,it);setItems(a);setWrong(false);};
  const chk=()=>{if(items.every((it,i)=>it===ans[i])){setOk(true);setTimeout(onDone,1e3);}else setWrong(true);};
  return(<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#0a0a1a,#1a1a2a)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:10}}>
    <div style={{color:"#4af",fontSize:11,fontFamily:"monospace",marginBottom:8}}>📋 BRIDGE PLAN — Order the Steps</div>
    <div style={{width:"100%",maxWidth:320}}>{items.map((it,i)=><div key={it} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2,background:ok?(it===ans[i]?"rgba(0,255,100,.12)":"rgba(255,0,0,.12)"):"rgba(70,170,255,.06)",border:`1px solid ${ok&&it===ans[i]?"#0f8":"#4af33"}`,borderRadius:5,padding:"4px 7px"}}>
      <span style={{color:"#4af",fontSize:10,fontWeight:"bold",minWidth:16}}>{i+1}</span>
      <span style={{color:"#e0e8ff",fontSize:10,fontFamily:"monospace",flex:1}}>{it}</span>
      {!ok&&<div style={{display:"flex",flexDirection:"column",gap:1}}>{i>0&&<button onClick={()=>mv(i,i-1)} style={{background:"none",border:"1px solid #4af33",color:"#4af",cursor:"pointer",borderRadius:2,padding:"0 4px",fontSize:11,lineHeight:1}}>▲</button>}{i<items.length-1&&<button onClick={()=>mv(i,i+1)} style={{background:"none",border:"1px solid #4af33",color:"#4af",cursor:"pointer",borderRadius:2,padding:"0 4px",fontSize:11,lineHeight:1}}>▼</button>}</div>}
    </div>)}</div>
    {wrong&&<div style={{color:"#f88",fontSize:10,marginTop:4}}>Wrong order! Try again.</div>}
    {!ok&&<button onClick={chk} style={{marginTop:8,background:"#4af",border:"none",borderRadius:8,padding:"7px 20px",color:"#000",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:"monospace"}}>✅ Check</button>}
    {ok&&<div style={{marginTop:8,color:"#0f8",fontSize:12,fontFamily:"monospace"}}>✅ Correct!</div>}
  </div>);}

// TradeOff — no correct reveal on wrong

  </div>);}

function Game(){

  const [inv,setInv]=useState(["Ball","Net","Magnet","Hammer","Screwdriver","Garden Shears"]);

  const [turtleWrong,setTurtleWrong]=useState(0);const [turtleInput,setTurtleInput]=useState("");
  const [repStep,setRepStep]=useState(0);const [endP,setEndP]=useState(0);
  const [stuNo,setStuNo]=useState("");const [stuName,setStuName]=useState("");
  const [loggedIn,setLoggedIn]=useState(false);const [board,setBoard]=useState([]);
  const [boardLoading,setBoardLoading]=useState(false);const [saved,setSaved]=useState(false);

  const add=i=>setInv(p=>[...p,i]);
  const rm=i=>setInv(p=>{const x=p.indexOf(i);return x>=0?[...p.slice(0,x),...p.slice(x+1)]:p;});
  const go=s=>{setSub(0);setSelItem(null);setMsg(null);setSc(s);};
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(null),2500);};
  const wrongItem=()=>{setN2(n=>Math.max(0,n-5));flash("Wrong item! Nitrogen dropped. 🔻");setSelItem(null);};

  const handleSelItem=(item)=>{
    if(selItem===item){setSelItem(null);return;}
    if(sc==="MONKEY"&&sub===1){if(item==="Ball"){setSelItem(item);setSub(2);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="FLOWER"&&sub===3){if(item==="Garden Shears"){setSelItem(item);setSub(4);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="CAVE"&&sub===0){if(item==="Magnet"){setSelItem(item);setSub(1);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="STEALTH_PRE"){if(item==="Screwdriver"){setSelItem(item);go("STEALTH");}else{setSelItem(null);wrongItem();}return;}
    if(sc==="REPAIR"){
      const needed=["Flower Pollen","Motor","Screw","Screwdriver"][repStep];
      if(repStep<4){if(item===needed){setSelItem(item);setRepStep(r=>r+1);flash("✅ "+item+" installed!");}else{setSelItem(null);wrongItem();}return;}
    }
    setSelItem(item);
  };

  const saveScore=async()=>{if(saved||!loggedIn)return;
    const entry={name:stuName,no:stuNo,n2:Math.round(n2)};
    try{const all=JSON.parse(localStorage.getItem("nitro_scores")||"{}");all[stuNo]={...entry,date:new Date().toISOString()};localStorage.setItem("nitro_scores",JSON.stringify(all));}catch(e){}
    if(SCORE_API&&!SCORE_API.includes("PASTE")){try{await fetch(SCORE_API,{method:"POST",body:JSON.stringify(entry),headers:{"Content-Type":"text/plain"}});}catch(e){}}

    try{const all=JSON.parse(localStorage.getItem("nitro_scores")||"{}");const entries=Object.values(all);entries.sort((a,b)=>b.n2-a.n2);setBoard(entries);}catch(e){setBoard([]);}
    setBoardLoading(false);};

  useEffect(()=>{if(sc==="TITLE"||sc==="ENDING"||sc==="LOGIN"||sc==="BOARD")return;const t=setInterval(()=>setN2(n=>Math.max(0,n-.25)),3e3);return()=>clearInterval(t);},[sc]);

        <div style={{color:"#8af",fontSize:10,fontFamily:"monospace",marginBottom:4}}>Full Name</div>

    {/* TITLE */}
    {sc==="TITLE"&&<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#000010,#000030)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <Stars/><div style={{fontSize:24,fontFamily:"monospace",color:"#4af",textShadow:"0 0 30px rgba(70,170,255,.6)",marginBottom:6,letterSpacing:5,zIndex:1}}>NITRO</div>
      <div style={{fontSize:11,fontFamily:"monospace",color:"#0ff",marginBottom:30,letterSpacing:3,zIndex:1}}>RETURN TO SPACE</div>
      <div style={{fontSize:56,marginBottom:30,zIndex:1}}>🚀</div>
      <button onClick={()=>go("CRASH")} style={{background:"transparent",border:"2px solid #4af",borderRadius:10,padding:"10px 28px",color:"#4af",fontSize:13,cursor:"pointer",fontFamily:"monospace",zIndex:1,animation:"pulse 2s infinite alternate"}}>START</button>
    </div>}

    {/* CRASH */}
    {sc==="CRASH"&&<div style={{position:"relative",width:"100%",height:"100%"}}><ForestNight/><Ground c="#1a3a10"/>
      <div style={{position:"absolute",bottom:56,left:"38%",fontSize:44,transform:"rotate(22deg)",filter:"drop-shadow(0 0 12px rgba(255,100,0,.5))",zIndex:3}}>🚀</div>
      <div style={{position:"absolute",bottom:88,left:"44%",fontSize:18,opacity:.5,zIndex:3}}>💨</div>
      <div style={{position:"absolute",bottom:52,left:"60%",fontSize:36,zIndex:5}}>👽</div>
      <Dlg speaker="NITRO" text="This planet's atmosphere is not suitable for me... My nitrogen level is dropping. I must find food and repair my spaceship!" onNext={()=>go("MONKEY")}/>
    </div>}

    {/* MONKEY */}
    {sc==="MONKEY"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JungleDay/><Ground c="#2a6a1a"/>
      {sub===0&&<><div style={{position:"absolute",bottom:52,left:"18%",fontSize:42,zIndex:5}}>👽</div>
        <Dlg speaker="MOTHER MONKEY" text="My baby is lost up in the tree! Please help me find it! Use the right tool from your inventory to get it down. I'll give you a banana in return!" onNext={()=>setSub(1)}/></>}
      {sub===1&&<><div style={{position:"absolute",bottom:52,left:"18%",fontSize:42,zIndex:5}}>👽</div>
        <Dlg speaker="MISSION" text="The baby monkey is hiding in the tree. Select the right item from your inventory to get it down!"/></>}
      {sub===2&&<BallThrow onHit={()=>{rm("Ball");setSub(3);}}/>}
      {sub===3&&<><div style={{position:"absolute",bottom:60,left:"65%",fontSize:28,zIndex:3}}>🐵🍌</div>
        <Dlg speaker="SYSTEM" text="🍌 Baby monkey found! The mother monkey gave you a banana. Hunger restored!" onNext={()=>{setHunger(80);add("Banana");go("TURTLE");}}/></>}
    </div>}

    {/* TURTLE */}
    {sc==="TURTLE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JungleDay/><Ground c="#3a5a2a"/>
      <div style={{position:"absolute",bottom:52,left:"28%",fontSize:36,zIndex:5}}>👽</div>
      <div style={{position:"absolute",bottom:55,left:"65%",fontSize:40,zIndex:3}}>🐢</div>
      <div style={{position:"absolute",bottom:6,left:6,right:6,zIndex:50,background:"rgba(5,5,20,.93)",border:"2px solid #4af",borderRadius:10,padding:"8px 12px"}}>
        <div style={{fontSize:9,color:"#0c8",fontFamily:"monospace",marginBottom:3}}>TURTLE</div>
        <div style={{color:"#aaa",fontSize:10,marginBottom:4}}>Solve the turtle's riddle to earn a map that will guide your journey!</div>
        <div style={{color:"#e0e8ff",fontSize:12,lineHeight:1.5,fontFamily:"monospace",marginBottom:7}}>"Those who rush without me often fail. Those who use me find the right path. What am I?"</div>
        {turtleWrong===0?<div style={{display:"flex",gap:5}}>
          <input value={turtleInput} onChange={e=>setTurtleInput(e.target.value)} placeholder="Type your answer..." onKeyDown={e=>{if(e.key==="Enter"){if(turtleInput.toLowerCase()==="analysis"){add("Map");go("FLOWER");}else{setTurtleWrong(1);setN2(n=>Math.max(0,n-5));}}}}
            style={{flex:1,background:"#111",border:"1px solid #4af",borderRadius:5,color:"#fff",padding:"6px 8px",fontSize:12,fontFamily:"monospace",outline:"none"}}/>
          <button onClick={()=>{if(turtleInput.toLowerCase()==="analysis"){add("Map");go("FLOWER");}else{setTurtleWrong(1);setN2(n=>Math.max(0,n-5));}}} style={{background:"#4af",border:"none",borderRadius:5,padding:"6px 12px",color:"#000",fontWeight:"bold",cursor:"pointer"}}>→</button>
        </div>:<div>
          <div style={{color:"#f88",fontSize:10,marginBottom:5}}>Wrong! Pick one:</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{["System","Analysis","Analyssis","Logistic"].map((o,i)=><button key={i} onClick={()=>{if(o==="Analysis"){add("Map");go("FLOWER");}else setN2(n=>Math.max(0,n-5));}} style={{background:"rgba(70,170,255,.12)",border:"1px solid #4af",color:"#fff",padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"monospace",flex:"1 1 40%"}}>{o}</button>)}</div>
        </div>}
      </div></div>}

    {/* FLOWER */}
    {sc==="FLOWER"&&<div style={{position:"relative",width:"100%",height:"100%"}}><FlowerField/><Ground c="#2a7a18"/>
      <div style={{position:"absolute",bottom:52,left:"22%",fontSize:36,zIndex:5}}>👽</div>
      {sub===0&&<Dlg speaker="SYSTEM" text="You need to reach the flower to collect its pollen for fuel. Which path do you choose?" choices={["🌳 Tree Roots Path","🌿 Grassy Path"]} onChoice={c=>{if(c===0){setSub(1);setN2(n=>Math.max(0,n-5));}else setSub(2);}}/>}
      {sub===1&&<Dlg speaker="SYSTEM" text="Dead end! Giant trees block the way. Go back." onNext={()=>setSub(0)}/>}
      {sub===2&&<Dlg speaker="SYSTEM" text="The flower's pollen could be fuel, but it looks weak. What should you do?" choices={["🌱 Add Fertilizer","💧 Give Water"]} onChoice={c=>{if(c===0){setN2(n=>Math.max(0,n-5));flash("Fertilizer didn't work!");}else setSub(3);}}/>}
      {sub===3&&<Dlg speaker="SYSTEM" text="The flower revived a bit, but wild weeds are blocking the sunlight! Select the right tool from your inventory to trim them."/>}
      {sub===4&&<Dlg speaker="MISSION" text="Good choice! Now carefully cut the weeds around the flower." onNext={()=>setSub(5)}/>}
      {sub===5&&<WeedCut onDone={()=>setSub(6)}/>}
      {sub===6&&<><div style={{position:"absolute",bottom:70,left:"55%",fontSize:44,filter:"drop-shadow(0 0 12px rgba(255,255,0,.5))",zIndex:3,animation:"pulse 1.5s infinite alternate"}}>🌺</div>
        <Dlg speaker="SYSTEM" text="✨ The flower bloomed! Flower Pollen added to inventory." onNext={()=>{add("Flower Pollen");go("NATIVES");}}/></>}
    </div>}

    {/* NATIVES */}
    {sc==="NATIVES"&&<div style={{position:"relative",width:"100%",height:"100%"}}><VillageScene/><Ground c="#2a3a12" h={42}/>
      <div style={{position:"absolute",bottom:46,left:"22%",fontSize:36,zIndex:5}}>👽</div>
      {sub===0&&<Dlg speaker="SYSTEM" text="You need to reach the native village. Which path do you choose?" choices={["🌲 Plain Forest","🔥 Path with Fire"]} onChoice={c=>{if(c===0){setN2(n=>Math.max(0,n-5));flash("Wrong path!");}else setSub(1);}}/>}
      {sub===1&&<><div style={{position:"absolute",bottom:48,left:"68%",fontSize:24,zIndex:3}}>👤</div><div style={{position:"absolute",bottom:48,left:"76%",fontSize:24,zIndex:3}}>👤</div>
        <Dlg speaker="VILLAGE CHIEF" text="Welcome, stranger! We need help planning our bridge construction. Help us organize the steps, and we'll give you screws in return!" onNext={()=>go("FLOWCHART")}/></>}
    </div>}

    {sc==="FLOWCHART"&&<Flowchart onDone={()=>go("TRADEOFF1")}/>}
    {sc==="TRADEOFF1"&&<TradeOff title="Choose the right balance for the bridge:" choices={[["Collaboration","Independence"],["Simple Design","Fancy Design"],["Speed","Durability"]]} correct={[0,0,1]} onOk={()=>{add("Screw");go("JUNKYARD");}} onFail={()=>setN2(n=>Math.max(0,n-8))}/>}

    {/* JUNKYARD */}
    {sc==="JUNKYARD"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
      <div style={{position:"absolute",bottom:55,left:"70%",fontSize:26,zIndex:3}}>🦁</div>
      <div style={{position:"absolute",bottom:46,left:"15%",fontSize:36,zIndex:5}}>👽</div>
      <Dlg speaker="SYSTEM" text="You found a working motor inside a junked car! But a lion is guarding it. You need that motor to repair your ship." onNext={()=>go("TRADEOFF2")}/>
    </div>}

    {sc==="TRADEOFF2"&&<TradeOff title="Choose your motor extraction strategy:" choices={[["Speed","Stealth"],["Energy Saving","Performance"]]} correct={[1,1]} onOk={()=>go("STEALTH_PRE")} onFail={()=>setN2(n=>Math.max(0,n-8))}/>}

    {sc==="STEALTH_PRE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
      <div style={{position:"absolute",bottom:55,left:"70%",fontSize:26,zIndex:3}}>🦁</div>
      <div style={{position:"absolute",bottom:46,left:"15%",fontSize:36,zIndex:5}}>👽</div>
      <Dlg speaker="MISSION" text="You need the right tool to remove the motor. Select it from your inventory!"/>
    </div>}

    {sc==="STEALTH"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
      <Stealth onWin={()=>{add("Motor");go("CAVE");}} onCaught={()=>setN2(n=>Math.max(0,n-10))}/>
    </div>}

    {/* CAVE */}
    {sc==="CAVE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><CaveScene/>
      <div style={{position:"absolute",bottom:"22%",left:"60%",fontSize:34,zIndex:3}}>🧓</div>
      <div style={{position:"absolute",bottom:"18%",left:"36%",fontSize:28,zIndex:3}}>📦</div>
      {sub===0&&<Dlg speaker="OLD MAN" text="I know the way out of this cave, but first you must prove yourself. Some of these gold coins are fake — they're painted iron. Use the right tool from your inventory to separate real gold from iron, and I'll open the portal for you."/>}
      {sub===1&&<MagnetPuzzle onDone={()=>{setN2(n=>Math.max(5,n-15));go("REPAIR");}}/>}
    </div>}

    {/* REPAIR */}
    {sc==="REPAIR"&&<Repair step={repStep} onAction={a=>{if(a==="deploy")go("ENDING");}}/>}

    {/* ENDING */}
    {sc==="ENDING"&&<div style={{position:"relative",width:"100%",height:"100%",background:endP<2?"linear-gradient(to bottom,#0a1a0a,#1a2a1a)":"linear-gradient(to bottom,#000020,#000040)",overflow:"hidden",transition:"background 2s"}}>
      {endP>=2&&<Stars/>}{endP<2&&<><ForestNight/><Ground c="#2d5a1e"/></>}
      <div style={{position:"absolute",left:"50%",bottom:endP===0?"70px":endP===1?"50%":endP===2?"70%":"110%",transform:"translateX(-50%)",fontSize:52,transition:"bottom 3s ease-in-out",filter:"drop-shadow(0 0 18px rgba(0,150,255,.6))",zIndex:3}}>🚀</div>
      {endP>=1&&endP<3&&<div style={{position:"absolute",bottom:endP===1?"36%":"52%",left:"50%",transform:"translateX(-50%)",fontSize:20,opacity:.5,zIndex:3}}>🔥</div>}
      {endP>=3&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center",animation:"fadeIn 2s",zIndex:3}}>
        <div style={{color:"#4af",fontSize:13,fontFamily:"monospace",lineHeight:2.2,maxWidth:320,textShadow:"0 0 12px rgba(70,170,255,.4)"}}>"The right decisions determine not only your survival, but also your way home."</div>
        <div style={{marginTop:16,color:"#0f8",fontSize:17,fontFamily:"monospace"}}>NITRO: RETURN TO SPACE</div>
        <div style={{marginTop:8,color:"#fff",fontSize:12,fontFamily:"monospace"}}>
          {stuName} — Final Nitrogen: <span style={{color:n2>50?"#0f8":n2>25?"#fa0":"#f44",fontWeight:"bold",fontSize:16}}>{Math.round(n2)}%</span></div>
        <div style={{marginTop:4,color:"#888",fontSize:10}}>{saved?"✅ Score saved!":"⏳ Saving..."}</div>
        <button onClick={()=>{loadBoard();setSc("BOARD");}} style={{marginTop:14,background:"linear-gradient(135deg,#fa0,#f80)",border:"none",borderRadius:10,padding:"10px 24px",color:"#000",fontSize:13,fontWeight:"bold",cursor:"pointer",fontFamily:"monospace"}}>🏆 Leaderboard</button>
      </div>}
    </div>}

    {/* LEADERBOARD */}
    {sc==="BOARD"&&<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#000010,#0a0a2a)",display:"flex",flexDirection:"column",padding:16,overflow:"hidden"}}>
      <Stars/><div style={{textAlign:"center",marginBottom:12,zIndex:1}}>
        <div style={{color:"#fa0",fontSize:16,fontFamily:"monospace",fontWeight:"bold"}}>🏆 ALL-TIME LEADERBOARD</div>
        <div style={{color:"#888",fontSize:10,marginTop:4}}>Sorted by nitrogen level</div></div>
      {boardLoading?<div style={{color:"#4af",textAlign:"center",marginTop:40,fontSize:13,fontFamily:"monospace",zIndex:1}}>Loading...</div>:
      <div style={{flex:1,overflow:"auto",zIndex:1}}>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {board.map((e,i)=>{const isMe=e.no===stuNo;const bc=e.n2>60?"#0f8":e.n2>35?"#fa0":"#f44";
            return(<div key={i} style={{display:"flex",alignItems:"center",gap:6,background:isMe?"rgba(70,170,255,.12)":"rgba(255,255,255,.03)",border:isMe?"1.5px solid #4af":"1px solid #333",borderRadius:8,padding:"6px 10px"}}>
              <div style={{minWidth:22,color:i===0?"#fa0":i===1?"#ccc":i===2?"#c84":"#666",fontSize:13,fontWeight:"bold",fontFamily:"monospace"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</div>
              <div style={{flex:1,minWidth:0}}><div style={{color:isMe?"#4af":"#ddd",fontSize:11,fontFamily:"monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</div>
                <div style={{color:"#888",fontSize:8,fontFamily:"monospace"}}>{e.no}</div></div>
              <div style={{width:100,height:14,background:"rgba(255,255,255,.06)",borderRadius:7,overflow:"hidden"}}><div style={{height:"100%",width:`${e.n2}%`,background:bc,borderRadius:7}}/></div>
              <div style={{minWidth:32,color:bc,fontSize:13,fontWeight:"bold",fontFamily:"monospace",textAlign:"right"}}>{e.n2}%</div></div>);})}
          {board.length===0&&<div style={{color:"#666",textAlign:"center",marginTop:20,fontSize:12,fontFamily:"monospace"}}>No records yet</div>}
        </div></div>}
      <div style={{textAlign:"center",marginTop:10,zIndex:1,display:"flex",gap:8,justifyContent:"center"}}>
        <button onClick={()=>loadBoard()} style={{background:"transparent",border:"1px solid #4af",color:"#4af",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"monospace"}}>🔄 Refresh</button>
        <button onClick={()=>{setSc("LOGIN");setN2(85);setHunger(15);setInv(["Ball","Net","Magnet","Hammer","Screwdriver","Garden Shears"]);setRepStep(0);setEndP(0);setSub(0);setSaved(false);setTurtleWrong(0);setTurtleInput("");}} style={{background:"linear-gradient(135deg,#4af,#0ff)",border:"none",color:"#000",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"monospace",fontWeight:"bold"}}>🏠 Main Menu</button>
      </div></div>}

  </div>);}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Game));
</script>
</body>
</html>
