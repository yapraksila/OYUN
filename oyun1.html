// ─── DIALOG ───
const Dlg = ({text,speaker,onNext,choices,onChoice}) => {
  const [dt,setDt]=useState("");const [done,setDone]=useState(false);const idx=useRef(0);
  useEffect(()=>{idx.current=0;setDt("");setDone(false);const iv=setInterval(()=>{idx.current++;if(idx.current>=text.length){setDt(text);setDone(true);clearInterval(iv);}else setDt(text.slice(0,idx.current));},18);return()=>clearInterval(iv);},[text]);
  return(
    <div style={{position:"absolute",bottom:6,left:6,right:6,zIndex:50,background:"rgba(5,5,20,.93)",border:"2px solid #4af",borderRadius:10,padding:"8px 12px",backdropFilter:"blur(6px)"}}>
      {speaker&&<div style={{fontSize:9,color:speaker==="SİSTEM"?"#fa0":speaker==="NITRO"?"#4af":"#0c8",fontFamily:"monospace",marginBottom:3}}>{speaker}</div>}
      <div style={{color:"#e0e8ff",fontSize:12,lineHeight:1.5,fontFamily:"'Courier New',monospace",minHeight:30}}>{dt}{!done&&<span style={{animation:"blink .5s step-end infinite"}}>▊</span>}</div>
      {done&&!choices&&onNext&&<button onClick={onNext} style={{marginTop:4,background:"transparent",border:"1px solid #4af",color:"#4af",padding:"3px 12px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"monospace"}}>Devam ▶</button>}
      {done&&choices&&<div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:5}}>{choices.map((c,i)=><button key={i} onClick={()=>onChoice(i)} style={{background:"rgba(70,170,255,.12)",border:"1px solid #4af",color:"#fff",padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"monospace",flex:"1 1 auto",minWidth:90,textAlign:"center"}}>{c}</button>)}</div>}
    </div>
  );
};

// Ball Throw with angle/power
function BallThrow({onHit,onMiss}) {
  const [aim,setAim]=useState({x:50,y:50});
  const [thrown,setThrown]=useState(false);
  const [ball,setBall]=useState(null);
  const [result,setResult]=useState(null);
  const ref=useRef(null);
  const alienPos={x:15,y:78};
  const treePos={x:72,y:58};

  const handleAim=useCallback((e)=>{
    if(thrown)return;
    const r=ref.current?.getBoundingClientRect();if(!r)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    setAim({x:((cx-r.left)/r.width)*100,y:((cy-r.top)/r.height)*100});
  },[thrown]);

  const fire=useCallback(()=>{
    if(thrown||result==="hit")return;setThrown(true);setResult(null);
    const dx=aim.x-alienPos.x,dy=aim.y-alienPos.y;
    let step=0;
    setBall({x:alienPos.x,y:alienPos.y});
    const iv=setInterval(()=>{
      step++;const t=step/26;
      const x=alienPos.x+dx*t;
      const y=alienPos.y+dy*t+18*t*t;
      setBall({x:Math.max(0,Math.min(x,98)),y:Math.max(0,Math.min(y,98))});
      if(Math.abs(x-treePos.x)<12&&Math.abs(y-treePos.y)<14){clearInterval(iv);setResult("hit");setTimeout(onHit,1200);}
      if(step>=26){clearInterval(iv);if(!result){setResult("miss");onMiss?.();setTimeout(()=>{setThrown(false);setBall(null);setResult(null);},900);}}
    },40);
  },[aim,thrown,result]);

  return(
    <div ref={ref} onMouseMove={handleAim} onTouchMove={handleAim} onClick={fire} onTouchEnd={e=>{e.preventDefault();fire();}}
      style={{position:"absolute",inset:0,zIndex:10,cursor:thrown?"default":"crosshair",touchAction:"none"}}>
      {/* Target tree on ground */}
      <div style={{position:"absolute",left:`${treePos.x}%`,top:`${treePos.y}%`,transform:"translate(-50%,-50%)",zIndex:3}}>
        <svg width="55" height="75" viewBox="0 0 55 75"><rect x="24" y="42" width="7" height="33" fill="#6b4226"/><ellipse cx="27" cy="26" rx="24" ry="26" fill="#228B22"/><ellipse cx="27" cy="18" rx="17" ry="17" fill="#2ea82e" opacity=".7"/>
          <path d="M20 73 Q10 71 5 75" stroke="#5a3a1a" strokeWidth="3" fill="none"/><path d="M34 73 Q44 71 50 75" stroke="#5a3a1a" strokeWidth="3" fill="none"/>
        </svg>
        {result!=="hit"&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",fontSize:9,color:"#faa",whiteSpace:"nowrap",background:"rgba(0,0,0,.5)",padding:"2px 6px",borderRadius:4}}>🐒❓</div>}

// Stealth hold mechanic
function Stealth({onWin,onCaught}) {
  const [prog,setProg]=useState(0);const [dir,setDir]=useState("right");const [hold,setHold]=useState(false);const [caught,setCaught]=useState(false);
  const hr=useRef(false);const ir=useRef(null);
  useEffect(()=>{const t=setInterval(()=>{setDir(()=>{const n=Math.random()>.45?"left":"right"; // 55% looks at you
    if(n==="left"&&hr.current){setCaught(true);hr.current=false;if(ir.current)clearInterval(ir.current);}return n;});},900); // fast short glances
    return()=>clearInterval(t);},[]);
  const dn=()=>{if(caught)return;if(dir==="left"){setCaught(true);onCaught();return;}setHold(true);hr.current=true;ir.current=setInterval(()=>{setProg(p=>{if(p>=100){clearInterval(ir.current);hr.current=false;setHold(false);onWin();return 100;}return p+3;}); // slower progress
    },110);};
  const up=()=>{setHold(false);hr.current=false;if(ir.current)clearInterval(ir.current);};
  const restart=()=>{setCaught(false);setProg(0);onCaught();}; // full restart
  if(caught)return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(20,0,0,.92)",zIndex:20}}>
    <div style={{fontSize:52}}>🦁</div><div style={{color:"#f44",fontSize:14,fontFamily:"monospace",margin:"10px 0"}}>YAKALANDIN!</div>
    <div style={{color:"#faa",fontSize:11,marginBottom:12}}>Azot düştü! Baştan dene.</div>
    <button onClick={restart} style={{background:"#f44",border:"none",borderRadius:8,padding:"9px 20px",color:"#fff",cursor:"pointer",fontSize:12}}>Baştan Başla</button>
  </div>);
  return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:10,userSelect:"none"}}>
    <div style={{color:"#fa0",fontSize:11,fontFamily:"monospace",marginBottom:8,background:"rgba(0,0,0,.7)",padding:"4px 14px",borderRadius:6}}>🔇 GİZLİCE MOTORU SÖK — Aslan seni fark etmesin!</div>
    <div style={{fontSize:50,marginBottom:4,transform:dir==="left"?"scaleX(-1)":"none",transition:"transform .3s"}}>🦁</div>
    <div style={{color:dir==="left"?"#f44":"#0f8",fontSize:11,marginBottom:8,background:"rgba(0,0,0,.6)",padding:"3px 10px",borderRadius:4,fontFamily:"monospace"}}>{dir==="right"?"→ Öte tarafa bakıyor ✓":"← SANA BAKIYOR! ✗"}</div>
    <div style={{width:"65%",height:16,background:"rgba(0,0,0,.6)",borderRadius:8,overflow:"hidden",marginBottom:8,border:"1px solid #444"}}><div style={{height:"100%",width:`${prog}%`,borderRadius:8,background:`linear-gradient(90deg,#fa0,${prog>60?"#0f8":"#f80"})`,transition:"width .11s"}}/></div>
    <div style={{color:"#fa0",fontSize:12,fontFamily:"monospace",marginBottom:10}}>Sökme: {prog}%</div>
    <button onMouseDown={dn} onMouseUp={up} onMouseLeave={up} onTouchStart={dn} onTouchEnd={up}
      style={{background:hold?"#f80":"linear-gradient(135deg,#fa0,#f80)",border:"none",borderRadius:12,padding:"15px 30px",color:"#000",fontSize:14,fontWeight:"bold",cursor:"pointer",fontFamily:"monospace",transform:hold?"scale(.93)":"scale(1)",transition:"all .1s"}}>
      {hold?"⚙️ SÖKÜYOR...":"🔧 BASILI TUT"}
    </button>
    <div style={{color:"#f88",fontSize:9,marginTop:8}}>⚠️ Dikkat! Aslan çok sık dönüyor!</div>
  </div>);
}

// Magnet puzzle
function MagnetPuzzle({onDone}) {
  const coins=useRef(Array.from({length:9},(_,i)=>({id:i,gold:i<3,x:14+(i%3)*28,y:i<3?44:i<6?57:70}))).current;
  const [mp,setMp]=useState({x:50,y:24});const [att,setAtt]=useState(new Set());const [ok,setOk]=useState(false);const ref=useRef(null);
  const mv=useCallback(e=>{if(ok)return;const r=ref.current?.getBoundingClientRect();if(!r)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
    const x=((cx-r.left)/r.width)*100;const y=((cy-r.top)/r.height)*100;
    setMp({x:Math.max(5,Math.min(95,x)),y:Math.max(5,Math.min(95,y))});
    const nw=new Set(att);coins.forEach(c=>{if(!c.gold&&!nw.has(c.id)&&Math.sqrt((x-c.x)**2+(y-c.y)**2)<13)nw.add(c.id);});
    setAtt(nw);if(nw.size===coins.filter(c=>!c.gold).length&&!ok){setOk(true);setTimeout(onDone,1200);}
  },[att,ok]);
  return(<div ref={ref} onMouseMove={mv} onTouchMove={mv} style={{position:"absolute",inset:0,cursor:"none",touchAction:"none",zIndex:10}}>
    <div style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",color:"#fa0",fontSize:10,fontFamily:"monospace",background:"rgba(0,0,0,.7)",padding:"3px 10px",borderRadius:6,zIndex:20}}>Mıknatısı hareket ettir!</div>
    {coins.map(c=><div key={c.id} style={{position:"absolute",left:att.has(c.id)?`${mp.x}%`:`${c.x}%`,top:att.has(c.id)?`${mp.y}%`:`${c.y}%`,fontSize:24,transition:att.has(c.id)?"all .3s":"none",transform:"translate(-50%,-50%)",filter:c.gold?"drop-shadow(0 0 6px gold)":"none"}}>{c.gold?"🪙":"🔘"}</div>)}
    <div style={{position:"absolute",left:`${mp.x}%`,top:`${mp.y}%`,fontSize:30,transform:"translate(-50%,-50%)",pointerEvents:"none",filter:"drop-shadow(0 0 8px rgba(0,150,255,.5))"}}>🧲</div>
    {ok&&<div style={{position:"absolute",bottom:"20%",left:"50%",transform:"translateX(-50%)",color:"#0f8",fontSize:13,fontFamily:"monospace",background:"rgba(0,0,0,.7)",padding:"5px 14px",borderRadius:6}}>✅ Altınlar ayrıldı!</div>}
  </div>);
}

// Weed cutting
function WeedCut({onDone}) {
  const [weeds,setWeeds]=useState([{id:0,x:22,y:72},{id:1,x:36,y:78},{id:2,x:50,y:70},{id:3,x:62,y:76},{id:4,x:42,y:68},{id:5,x:74,y:73}]);
  const [scissorPos,setScissorPos]=useState({x:50,y:80});
  const [cutting,setCutting]=useState(null);
  const ref=useRef(null);
  const handleMove=useCallback(e=>{
    const r=ref.current?.getBoundingClientRect();if(!r)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
    setScissorPos({x:((cx-r.left)/r.width)*100,y:((cy-r.top)/r.height)*100});
  },[]);
  const cut=id=>{
    setCutting(id);
    setTimeout(()=>{
      const nw=weeds.map(w=>w.id===id?{...w,cut:true}:w);setWeeds(nw);setCutting(null);
      if(nw.every(w=>w.cut))setTimeout(onDone,500);
    },300);
  };
  return(<div ref={ref} onMouseMove={handleMove} onTouchMove={handleMove} style={{position:"absolute",inset:0,zIndex:10,cursor:"none",touchAction:"none"}}>
    {/* Central flower at ground */}
    <div style={{position:"absolute",left:"50%",top:"64%",transform:"translate(-50%,-50%)",fontSize:36}}>🌸</div>
    {/* Sun indicator */}
    <div style={{position:"absolute",right:"15%",top:"10%",fontSize:28,opacity:.7}}>☀️</div>
    {/* Weeds */}
    {weeds.map(w=>(
      <div key={w.id} onClick={()=>!w.cut&&cut(w.id)} onTouchEnd={()=>!w.cut&&cut(w.id)}
        style={{position:"absolute",left:`${w.x}%`,top:`${w.y}%`,transform:"translate(-50%,-50%)",transition:"all .3s",pointerEvents:w.cut?"none":"auto"}}>
        {w.cut?<div style={{fontSize:12,opacity:.3}}>🍂</div>:
        cutting===w.id?<div style={{fontSize:20,animation:"pulse .15s infinite alternate"}}>✂️🌿</div>:
        <div style={{fontSize:26,cursor:"pointer",filter:"drop-shadow(0 2px 3px rgba(0,0,0,.3))"}}>🌿</div>}
      </div>
    ))}
    {/* Scissors cursor */}
    <div style={{position:"absolute",left:`${scissorPos.x}%`,top:`${scissorPos.y}%`,transform:"translate(-50%,-50%) rotate(-30deg)",fontSize:28,pointerEvents:"none",zIndex:20,filter:"drop-shadow(0 0 6px rgba(255,255,255,.3))",transition:"left .05s,top .05s"}}>✂️</div>
    {/* HUD */}
    <div style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",color:"#fa0",fontSize:10,fontFamily:"monospace",background:"rgba(0,0,0,.7)",padding:"4px 12px",borderRadius:6,zIndex:20}}>✂️ Otları kes! Çiçeğe güneş gelsin</div>
    <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",color:"#aaa",fontSize:10,fontFamily:"monospace",background:"rgba(0,0,0,.6)",padding:"3px 10px",borderRadius:5}}>Kalan: {weeds.filter(w=>!w.cut).length}/{weeds.length}</div>
  </div>);
}

// Flowchart
function Flowchart({onDone}) {
  const ans=["Budget Planning","Load Requirements","Material Selection","Bridge Design","Material Procurement","Quality Inspection","Site Deployment","Issue Tracking"];
  const [items,setItems]=useState(()=>{const s=[...ans];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;});
  const [ok,setOk]=useState(false);const [wrong,setWrong]=useState(false);
  const mv=(f,t)=>{const a=[...items];const[it]=a.splice(f,1);a.splice(t,0,it);setItems(a);setWrong(false);};
  const chk=()=>{if(items.every((it,i)=>it===ans[i])){setOk(true);setTimeout(onDone,1e3);}else setWrong(true);};
  return(<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#0a0a1a,#1a1a2a)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:10}}>

      {!ok&&<div style={{display:"flex",flexDirection:"column",gap:1}}>{i>0&&<button onClick={()=>mv(i,i-1)} style={{background:"none",border:"1px solid #4af33",color:"#4af",cursor:"pointer",borderRadius:2,padding:"0 4px",fontSize:11,lineHeight:1}}>▲</button>}{i<items.length-1&&<button onClick={()=>mv(i,i+1)} style={{background:"none",border:"1px solid #4af33",color:"#4af",cursor:"pointer",borderRadius:2,padding:"0 4px",fontSize:11,lineHeight:1}}>▼</button>}</div>}
    </div>)}</div>

    {!ok&&<button onClick={chk} style={{marginTop:8,background:"#4af",border:"none",borderRadius:8,padding:"7px 20px",color:"#000",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:"monospace"}}>✅ Kontrol</button>}
    {ok&&<div style={{marginTop:8,color:"#0f8",fontSize:12,fontFamily:"monospace"}}>✅ Doğru!</div>}
  </div>);
}

// TradeOff
function TradeOff({title,choices,correct,onOk,onFail}) {
  const [ans,setAns]=useState({});const [chk,setChk]=useState(false);
  const allOk=chk&&choices.every((_,i)=>ans[i]===correct[i]);
  const go=()=>{
    setChk(true);
    if(choices.every((_,i)=>ans[i]===correct[i])){setTimeout(onOk,1200);}
    else{onFail?.();}
  };
  return(<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#1a0808,#2a1818)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:12}}>

    <div style={{color:"#ddd",fontSize:11,marginBottom:10,textAlign:"center"}}>{title}</div>
    {choices.map((pair,i)=><div key={i} style={{display:"flex",gap:7,marginBottom:7,width:"100%",maxWidth:330}}>
      {pair.map((opt,j)=><button key={j} onClick={()=>!chk&&setAns({...ans,[i]:j})} style={{flex:1,padding:"9px 5px",borderRadius:7,cursor:chk?"default":"pointer",fontSize:11,fontFamily:"monospace",background:chk?(allOk&&j===correct[i]?"rgba(0,255,100,.18)":!allOk&&ans[i]===j?"rgba(255,100,0,.18)":"rgba(255,255,255,.04)"):ans[i]===j?"rgba(70,170,255,.28)":"rgba(255,255,255,.04)",border:`2px solid ${chk?(allOk&&j===correct[i]?"#0f8":!allOk&&ans[i]===j?"#fa0":"#444"):ans[i]===j?"#4af":"#444"}`,color:"#ddd",transition:"all .15s"}}>{opt}</button>)}
    </div>)}
    {!chk&&Object.keys(ans).length===choices.length&&<button onClick={go} style={{marginTop:5,background:"#fa0",border:"none",borderRadius:8,padding:"8px 22px",color:"#000",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>Onayla</button>}
    {chk&&allOk&&<div style={{color:"#0f8",fontSize:12,marginTop:6,fontFamily:"monospace"}}>✅ Doğru Seçimler!</div>}
    {chk&&!allOk&&<div style={{textAlign:"center"}}>
      <div style={{color:"#f44",fontSize:12,marginTop:6,fontFamily:"monospace"}}>❌ Yanlış! Azot düştü. Tekrar düşün.</div>
      <button onClick={()=>{setChk(false);setAns({});}} style={{marginTop:8,background:"#f44",border:"none",borderRadius:7,padding:"7px 18px",color:"#fff",cursor:"pointer",fontSize:11}}>Tekrar Dene</button>
    </div>}
  </div>);
}

function Game() {
  const [sc,setSc]=useState("LOGIN");
  const [n2,setN2]=useState(85);
  const [hunger,setHunger]=useState(15);
  const [inv,setInv]=useState(["Top","Ağ","Mıknatıs","Çekiç","Tornavida","Bahçe Makası"]);
  const [showInv,setShowInv]=useState(false);
  const [selItem,setSelItem]=useState(null);
  const [sub,setSub]=useState(0);
  const [msg,setMsg]=useState(null);
  const [turtleWrong,setTurtleWrong]=useState(0);
  const [turtleInput,setTurtleInput]=useState("");
  const [repStep,setRepStep]=useState(0);
  const [endP,setEndP]=useState(0);

  // Student & Leaderboard
  const [stuNo,setStuNo]=useState("");
  const [stuName,setStuName]=useState("");
  const [loggedIn,setLoggedIn]=useState(false);
  const [board,setBoard]=useState([]);
  const [boardLoading,setBoardLoading]=useState(false);
  const [saved,setSaved]=useState(false);

  const add=i=>setInv(p=>[...p,i]);
  const rm=i=>setInv(p=>{const x=p.indexOf(i);return x>=0?[...p.slice(0,x),...p.slice(x+1)]:p;});
  const go=s=>{setSub(0);setSelItem(null);setMsg(null);setSc(s);};
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(null),2500);};
  const wrongItem=()=>{setN2(n=>Math.max(0,n-5));flash("Yanlış eşya! Azot düştü. 🔻");setSelItem(null);};

  // Use selected inventory item — the core mechanic!
  const handleSelItem = (item) => {
    if(selItem===item){setSelItem(null);return;}
    if(sc==="MONKEY"&&sub===1){if(item==="Top"){setSelItem(item);setSub(2);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="FLOWER"&&sub===3){if(item==="Bahçe Makası"){setSelItem(item);setSub(4);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="CAVE"&&sub===0){if(item==="Mıknatıs"){setSelItem(item);setSub(1);}else{setSelItem(null);wrongItem();}return;}
    if(sc==="STEALTH_PRE"){if(item==="Tornavida"){setSelItem(item);go("STEALTH");}else{setSelItem(null);wrongItem();}return;}
    // REPAIR steps — each step needs a specific item
    if(sc==="REPAIR"){
      const needed=["Çiçek Tozu","Motor","Vida","Tornavida"][repStep];
      if(repStep<4){
        if(item===needed){setSelItem(item);setRepStep(r=>r+1);flash("✅ "+item+" yerleştirildi!");}
        else{setSelItem(null);wrongItem();}
        return;
      }
    }
    setSelItem(item);
  };

  useEffect(()=>{if(sc==="TITLE"||sc==="ENDING"||sc==="LOGIN"||sc==="BOARD")return;const t=setInterval(()=>setN2(n=>Math.max(0,n-.25)),3e3);return()=>clearInterval(t);},[sc]);
  useEffect(()=>{if(sc!=="ENDING")return;const t1=setTimeout(()=>setEndP(1),2e3),t2=setTimeout(()=>setEndP(2),4e3),t3=setTimeout(()=>{setEndP(3);saveScore();},6e3);return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};},[sc]);

  // Save score to localStorage
  const saveScore = () => {
    if(saved||!loggedIn) return;
    try {
      const all = JSON.parse(localStorage.getItem("nitro_scores")||"{}");
      all[stuNo] = {name:stuName, no:stuNo, n2:Math.round(n2), date:new Date().toISOString()};
      localStorage.setItem("nitro_scores", JSON.stringify(all));
      setSaved(true);
    } catch(e) { console.error("Save failed",e); }
  };

  // Load all scores from localStorage
  const loadBoard = () => {
    setBoardLoading(true);
    try {
      const all = JSON.parse(localStorage.getItem("nitro_scores")||"{}");
      const entries = Object.values(all);
      entries.sort((a,b) => b.n2 - a.n2);
      setBoard(entries);
    } catch(e) { console.error("Load failed",e); setBoard([]); }
    setBoardLoading(false);
  };

  const hud=sc!=="TITLE"&&sc!=="ENDING"&&sc!=="LOGIN"&&sc!=="BOARD";

  return(
    <div style={{width:"100%",maxWidth:480,margin:"0 auto",height:"100vh",maxHeight:720,position:"relative",overflow:"hidden",background:"#000"}}>
      <style>{`@keyframes pulse{from{opacity:.7}to{opacity:1}}@keyframes blink{50%{opacity:0}}@keyframes twinkle{from{opacity:.15}to{opacity:.8}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}*{box-sizing:border-box}`}</style>
      {hud&&<HUD n2={Math.round(n2)} hunger={Math.round(hunger)} inv={inv} selItem={selItem} setSelItem={handleSelItem} showInv={showInv} setShowInv={setShowInv} msg={msg}/>}

      {/* LOGIN */}
      {sc==="LOGIN"&&<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#000010,#000030)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <Stars/>
        <div style={{fontSize:20,fontFamily:"monospace",color:"#4af",textShadow:"0 0 20px rgba(70,170,255,.5)",marginBottom:4,letterSpacing:4,zIndex:1}}>NITRO</div>
        <div style={{fontSize:10,fontFamily:"monospace",color:"#0ff",marginBottom:24,letterSpacing:2,zIndex:1}}>RETURN TO SPACE</div>
        <div style={{fontSize:44,marginBottom:20,zIndex:1}}>👽</div>
        <div style={{zIndex:1,width:"100%",maxWidth:280}}>
          <div style={{color:"#8af",fontSize:10,fontFamily:"monospace",marginBottom:4}}>Öğrenci Numarası</div>
          <input value={stuNo} onChange={e=>setStuNo(e.target.value)} placeholder="Örn: 2024001"
            style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1.5px solid #4af",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,fontFamily:"monospace",outline:"none",marginBottom:12}}/>
          <div style={{color:"#8af",fontSize:10,fontFamily:"monospace",marginBottom:4}}>Ad Soyad</div>
          <input value={stuName} onChange={e=>setStuName(e.target.value)} placeholder="Örn: Ali Yılmaz"
            style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1.5px solid #4af",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,fontFamily:"monospace",outline:"none",marginBottom:16}}/>
          <button onClick={()=>{if(stuNo.trim()&&stuName.trim()){setLoggedIn(true);setSc("TITLE");}}}
            disabled={!stuNo.trim()||!stuName.trim()}
            style={{width:"100%",background:stuNo.trim()&&stuName.trim()?"linear-gradient(135deg,#4af,#0ff)":"#333",border:"none",borderRadius:10,padding:"12px",color:stuNo.trim()&&stuName.trim()?"#000":"#666",fontSize:14,fontWeight:"bold",cursor:stuNo.trim()&&stuName.trim()?"pointer":"default",fontFamily:"monospace",transition:"all .2s"}}>
            Oyuna Gir 🚀
          </button>
        </div>
      </div>}

      {/* TITLE */}
      {sc==="TITLE"&&<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#000010,#000030)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <Stars/><div style={{fontSize:24,fontFamily:"monospace",color:"#4af",textShadow:"0 0 30px rgba(70,170,255,.6)",marginBottom:6,letterSpacing:5,zIndex:1}}>NITRO</div>
        <div style={{fontSize:11,fontFamily:"monospace",color:"#0ff",marginBottom:30,letterSpacing:3,zIndex:1}}>RETURN TO SPACE</div>
        <div style={{fontSize:56,marginBottom:30,zIndex:1}}>🚀</div>
        <button onClick={()=>go("CRASH")} style={{background:"transparent",border:"2px solid #4af",borderRadius:10,padding:"10px 28px",color:"#4af",fontSize:13,cursor:"pointer",fontFamily:"monospace",zIndex:1,animation:"pulse 2s infinite alternate"}}>BAŞLA</button>
      </div>}

      {/* CRASH */}
      {sc==="CRASH"&&<div style={{position:"relative",width:"100%",height:"100%"}}><ForestNight/><Ground c="#1a3a10"/>
        <div style={{position:"absolute",bottom:56,left:"38%",fontSize:44,transform:"rotate(22deg)",filter:"drop-shadow(0 0 12px rgba(255,100,0,.5))",zIndex:3}}>🚀</div>
        <div style={{position:"absolute",bottom:88,left:"44%",fontSize:18,opacity:.5,zIndex:3}}>💨</div>
        <Alien x="58%" anim="breathe"/>
        <Dlg speaker="NITRO" text="Bu gezegenin atmosferi bana uygun değil... Azot seviyem düşüyor. Acilen besin bulmalı ve aracımı tamir etmeliyim!" onNext={()=>go("MONKEY")}/>
      </div>}

      {/* MONKEY */}
      {sc==="MONKEY"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JungleDay/><Ground c="#2a6a1a"/>
        <div style={{position:"absolute",bottom:120,left:"72%",fontSize:30,zIndex:3}}>🐒</div>
        <Alien x="25%"/>
        {sub===0&&<Dlg speaker="ANNE MAYMUN" text="Yavrum ağacın tepesinde kayboldu! Yardımına ihtiyacım var... Doğru aracı kullanarak yavruyu bulabilir misin?" onNext={()=>setSub(1)}/>}
        {sub===1&&<Dlg speaker="GÖREV" text="Yavru maymunu ağaçtan indirmen gerekiyor. Envanterdeki doğru eşyayı seç ve kullan!"/>}
        {sub===2&&<BallThrow onHit={()=>{rm("Top");setSub(3);}} onMiss={()=>flash("Iskaladın! Tekrar dene.")}/>}
        {sub===3&&<><div style={{position:"absolute",bottom:80,left:"68%",fontSize:22,zIndex:3}}>🐵</div>
          <Dlg speaker="SİSTEM" text="🍌 Yavru maymun bulundu! Anne maymun sana muz verdi." onNext={()=>{setHunger(80);add("Muz");go("TURTLE");}}/></>}
      </div>}

      {/* TURTLE */}
      {sc==="TURTLE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JungleDay/><Ground c="#3a5a2a"/>
        <Alien x="28%"/><div style={{position:"absolute",bottom:55,left:"65%",fontSize:40,zIndex:3}}>🐢</div>
        <div style={{position:"absolute",bottom:6,left:6,right:6,zIndex:50,background:"rgba(5,5,20,.93)",border:"2px solid #4af",borderRadius:10,padding:"8px 12px"}}>
          <div style={{fontSize:9,color:"#0c8",fontFamily:"monospace",marginBottom:3}}>KAPLUMBAĞA</div>
          <div style={{color:"#e0e8ff",fontSize:11,lineHeight:1.5,fontFamily:"monospace",marginBottom:7}}>"Those who rush without me often fail. Those who use me find the right path. What am I?"</div>
          {turtleWrong===0?<div style={{display:"flex",gap:5}}>
            <input value={turtleInput} onChange={e=>setTurtleInput(e.target.value)} placeholder="Cevabını yaz..." onKeyDown={e=>{if(e.key==="Enter"){if(turtleInput.toLowerCase()==="analysis"){add("Harita");go("FLOWER");}else{setTurtleWrong(1);setN2(n=>Math.max(0,n-5));}}}}
              style={{flex:1,background:"#111",border:"1px solid #4af",borderRadius:5,color:"#fff",padding:"6px 8px",fontSize:12,fontFamily:"monospace",outline:"none"}}/>
            <button onClick={()=>{if(turtleInput.toLowerCase()==="analysis"){add("Harita");go("FLOWER");}else{setTurtleWrong(1);setN2(n=>Math.max(0,n-5));}}} style={{background:"#4af",border:"none",borderRadius:5,padding:"6px 12px",color:"#000",fontWeight:"bold",cursor:"pointer"}}>→</button>
          </div>:<div>
            <div style={{color:"#f88",fontSize:10,marginBottom:5}}>Yanlış! Birini seç:</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{["System","Analysis","Analyssis","Logistic"].map((o,i)=><button key={i} onClick={()=>{if(o==="Analysis"){add("Harita");go("FLOWER");}else setN2(n=>Math.max(0,n-5));}} style={{background:"rgba(70,170,255,.12)",border:"1px solid #4af",color:"#fff",padding:"6px 12px",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"monospace",flex:"1 1 40%"}}>{o}</button>)}</div>
          </div>}
        </div>
      </div>}

      {/* FLOWER */}
      {sc==="FLOWER"&&<div style={{position:"relative",width:"100%",height:"100%"}}><FlowerField/><Ground c="#2a7a18"/>
        <Alien x="22%"/>
        {sub===0&&<Dlg speaker="SİSTEM" text="Haritana göre iki yol var. Hangisini seçeceksin?" choices={["🌳 Ağaç Kökleri","🌿 Çimenli Alan"]} onChoice={c=>{if(c===0){setSub(1);setN2(n=>Math.max(0,n-5));}else{setSub(2);}}}/>}
        {sub===1&&<Dlg speaker="SİSTEM" text="Çıkmaz yol! Geri dön." onNext={()=>setSub(0)}/>}
        {sub===2&&<Dlg speaker="SİSTEM" text="Çiçeğin tozu yakıt olabilir ama çiçek halsiz. Ne yapacaksın?" choices={["🌱 Gübre Ver","💧 Su Ver"]} onChoice={c=>{if(c===0){setN2(n=>Math.max(0,n-5));flash("Gübre işe yaramadı!");}else{setSub(3);}}}/>}
        {sub===3&&<Dlg speaker="SİSTEM" text="Çiçek biraz canlandı ama yabani otlar güneşi engelliyor! Otları budaman gerekiyor. Envanterdeki doğru eşyayı seç!"/>}
        {sub===4&&<Dlg speaker="GÖREV" text="Doğru eşyayı seçtin! Şimdi otları tek tek kes." onNext={()=>setSub(5)}/>}
        {sub===5&&<WeedCut onDone={()=>setSub(6)}/>}
        {sub===6&&<><div style={{position:"absolute",bottom:70,left:"55%",fontSize:44,filter:"drop-shadow(0 0 12px rgba(255,255,0,.5))",zIndex:3,animation:"pulse 1.5s infinite alternate"}}>🌺</div>
          <Dlg speaker="SİSTEM" text="✨ Çiçek canlandı! Çiçek tozu envantere eklendi." onNext={()=>{add("Çiçek Tozu");go("NATIVES");}}/></>}
      </div>}

      {/* NATIVES */}
      {sc==="NATIVES"&&<div style={{position:"relative",width:"100%",height:"100%"}}><VillageScene/><Ground c="#2a3a12" h={42}/>
        <Alien x="22%"/>
        {sub===0&&<Dlg speaker="SİSTEM" text="Yol ayrımı! Haritana bak ve doğru yolu seç." choices={["🌲 Düz Orman","🔥 Ateş Yolu"]} onChoice={c=>{if(c===0){setN2(n=>Math.max(0,n-5));flash("Yanlış yol!");}else setSub(1);}}/>}
        {sub===1&&<Dlg speaker="YERLİ LİDERİ" text="Hoş geldin! Köprü planlamasında bize yardım et, karşılığında vida veririz." onNext={()=>go("FLOWCHART")}/>}
      </div>}

      {sc==="FLOWCHART"&&<Flowchart onDone={()=>go("TRADEOFF1")}/>}
      {sc==="TRADEOFF1"&&<TradeOff title="Köprü için doğru dengeleri seç:" choices={[["İşbirliği","Bağımsızlık"],["Basit Tasarım","Gösterişli"],["Hız","Dayanıklılık"]]} correct={[0,0,1]} onOk={()=>{add("Vida");go("JUNKYARD");}} onFail={()=>setN2(n=>Math.max(0,n-8))}/>}

      {/* JUNKYARD */}
      {sc==="JUNKYARD"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
        <div style={{position:"absolute",bottom:55,left:"70%",fontSize:26,zIndex:3}}>🦁</div><Alien x="15%"/>
        <Dlg speaker="SİSTEM" text="Hurda araçlar arasında çalışan bir motor var ama bir aslan etrafında dolaşıyor!" onNext={()=>go("TRADEOFF2")}/>
      </div>}

      {sc==="TRADEOFF2"&&<TradeOff title="Motor sökme stratejini belirle:" choices={[["Hız","Sessizlik"],["Enerji Tasarrufu","Performans"]]} correct={[1,1]} onOk={()=>go("STEALTH_PRE")} onFail={()=>setN2(n=>Math.max(0,n-8))}/>}

      {/* STEALTH_PRE — player must pick Tornavida from inventory */}
      {sc==="STEALTH_PRE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
        <div style={{position:"absolute",bottom:55,left:"70%",fontSize:26,zIndex:3}}>🦁</div><Alien x="15%"/>
        <Dlg speaker="GÖREV" text="Motoru sökmek için doğru aleti envanterdeki eşyalardan seç!"/>
      </div>}

      {sc==="STEALTH"&&<div style={{position:"relative",width:"100%",height:"100%"}}><JunkyardScene/><Ground c="#3a3a22" h={42}/>
        <Stealth onWin={()=>{add("Motor");go("CAVE");}} onCaught={()=>setN2(n=>Math.max(0,n-12))}/>
      </div>}

      {/* CAVE */}
      {sc==="CAVE"&&<div style={{position:"relative",width:"100%",height:"100%"}}><CaveScene/>
        <div style={{position:"absolute",bottom:"22%",left:"60%",fontSize:34,zIndex:3}}>🧓</div>
        <div style={{position:"absolute",bottom:"18%",left:"36%",fontSize:28,zIndex:3}}>📦</div>
        {sub===0&&<Dlg speaker="YAŞLI ADAM" text="Bu sarı paraların bazıları altın, bazıları boyalı demir. Gerçek altınları ayırt edersen portalı açarım. Envanterdeki doğru aleti seç!"/>}
        {sub===1&&<MagnetPuzzle onDone={()=>{setN2(n=>Math.max(5,n-15));go("REPAIR");}}/>}
      </div>}

      {/* REPAIR */}
      {sc==="REPAIR"&&<Repair step={repStep} onAction={a=>{if(a==="deploy")go("ENDING");}}/>}

      {/* ENDING */}
      {sc==="ENDING"&&<div style={{position:"relative",width:"100%",height:"100%",background:endP<2?"linear-gradient(to bottom,#0a1a0a,#1a2a1a)":"linear-gradient(to bottom,#000020,#000040)",overflow:"hidden",transition:"background 2s"}}>
        {endP>=2&&<Stars/>}{endP<2&&<><ForestNight/><Ground c="#2d5a1e"/></>}
        <div style={{position:"absolute",left:"50%",bottom:endP===0?"70px":endP===1?"50%":endP===2?"70%":"110%",transform:"translateX(-50%)",fontSize:52,transition:"bottom 3s ease-in-out",filter:"drop-shadow(0 0 18px rgba(0,150,255,.6))",zIndex:3}}>🚀</div>
        {endP>=1&&endP<3&&<div style={{position:"absolute",bottom:endP===1?"36%":"52%",left:"50%",transform:"translateX(-50%)",fontSize:20,opacity:.5,zIndex:3}}>🔥</div>}
        {endP>=3&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center",animation:"fadeIn 2s",zIndex:3}}>
          <div style={{color:"#4af",fontSize:13,fontFamily:"monospace",lineHeight:2.2,maxWidth:320,textShadow:"0 0 12px rgba(70,170,255,.4)"}}>"Doğru kararlar yalnızca hayatta kalmanı değil, dönüş yolunu da belirler."</div>
          <div style={{marginTop:16,color:"#0f8",fontSize:17,fontFamily:"monospace"}}>NITRO: RETURN TO SPACE</div>
          <div style={{marginTop:8,color:"#fff",fontSize:12,fontFamily:"monospace"}}>
            {stuName} — Final Azot: <span style={{color:n2>50?"#0f8":n2>25?"#fa0":"#f44",fontWeight:"bold",fontSize:16}}>{Math.round(n2)}%</span>
          </div>
          <div style={{marginTop:4,color:"#888",fontSize:10}}>{saved?"✅ Skor kaydedildi!":"⏳ Kaydediliyor..."}</div>
          <button onClick={()=>{loadBoard();setSc("BOARD");}} style={{marginTop:14,background:"linear-gradient(135deg,#fa0,#f80)",border:"none",borderRadius:10,padding:"10px 24px",color:"#000",fontSize:13,fontWeight:"bold",cursor:"pointer",fontFamily:"monospace"}}>🏆 Skor Tablosu</button>
        </div>}
      </div>}

      {/* LEADERBOARD */}
      {sc==="BOARD"&&<div style={{position:"relative",width:"100%",height:"100%",background:"linear-gradient(to bottom,#000010,#0a0a2a)",display:"flex",flexDirection:"column",padding:16,overflow:"hidden"}}>
        <Stars/>
        <div style={{textAlign:"center",marginBottom:12,zIndex:1}}>
          <div style={{color:"#fa0",fontSize:16,fontFamily:"monospace",fontWeight:"bold"}}>🏆 ALL-TIME SKOR TABLOSU</div>
          <div style={{color:"#888",fontSize:10,marginTop:4}}>Azot seviyesine göre sıralı</div>
        </div>
        {boardLoading?<div style={{color:"#4af",textAlign:"center",marginTop:40,fontSize:13,fontFamily:"monospace",zIndex:1}}>Yükleniyor...</div>:
        <div style={{flex:1,overflow:"auto",zIndex:1}}>
          {/* Bar chart */}
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {board.map((e,i)=>{
              const isMe=e.no===stuNo;
              const barColor=e.n2>60?"#0f8":e.n2>35?"#fa0":"#f44";
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:isMe?"rgba(70,170,255,.12)":"rgba(255,255,255,.03)",border:isMe?"1.5px solid #4af":"1px solid #333",borderRadius:8,padding:"6px 10px"}}>
                  <div style={{minWidth:22,color:i===0?"#fa0":i===1?"#ccc":i===2?"#c84":"#666",fontSize:13,fontWeight:"bold",fontFamily:"monospace"}}>
                    {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:isMe?"#4af":"#ddd",fontSize:11,fontFamily:"monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.name}</div>
                    <div style={{color:"#888",fontSize:8,fontFamily:"monospace"}}>{e.no}</div>
                  </div>
                  <div style={{width:100,height:14,background:"rgba(255,255,255,.06)",borderRadius:7,overflow:"hidden",position:"relative"}}>
                    <div style={{height:"100%",width:`${e.n2}%`,background:barColor,borderRadius:7,transition:"width .5s"}}/>
                  </div>
                  <div style={{minWidth:32,color:barColor,fontSize:13,fontWeight:"bold",fontFamily:"monospace",textAlign:"right"}}>{e.n2}%</div>
                </div>
              );
            })}
            {board.length===0&&<div style={{color:"#666",textAlign:"center",marginTop:20,fontSize:12,fontFamily:"monospace"}}>Henüz kayıt yok</div>}
          </div>
        </div>}
        <div style={{textAlign:"center",marginTop:10,zIndex:1}}>
          <button onClick={()=>loadBoard()} style={{background:"transparent",border:"1px solid #4af",color:"#4af",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"monospace",marginRight:8}}>🔄 Yenile</button>
          <button onClick={()=>{setSc("LOGIN");setN2(85);setHunger(15);setInv(["Top","Ağ","Mıknatıs","Çekiç","Tornavida","Bahçe Makası"]);setRepStep(0);setEndP(0);setSub(0);setSaved(false);setTurtleWrong(0);setTurtleInput("");}} style={{background:"linear-gradient(135deg,#4af,#0ff)",border:"none",color:"#000",padding:"6px 16px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"monospace",fontWeight:"bold"}}>🏠 Ana Menüye Dön</button>
        </div>
      </div>}
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Game));
  </script>
</body>
</html>
